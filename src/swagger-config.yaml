openapi: 3.0.0
info:
  title: DBX API
  version: "2"
  description: "**Welcome to DBX's API!**\r\n\r\nThe DBX API allows you to integrate your application or website with the DBX courier network. Whether you need to deliver an order ASAP or within a customer-selected time frame, our API enables you to automate the entire delivery process.\r\n\r\nThis documentation provides the necessary resources, examples, and guidelines to help you create, manage, and monitor deliveries.\r\n\r\nAll requests require the use of a bearer token, which can be created in your portal under Automation > API.\r\n\r\nResources:\r\n<br>\r\n[Postman](https://www.postman.com/dbx-delivery/dbx-api/overview)\r\n<br>\r\n[FAQ](https://dbx.delivery/faq#dev)"
  contact:
    email: webmaster@dbx.delivery
    name: Delivery Bot Support
  termsOfService: "http://dbx.delivery/terms"
servers:
  - url: "https://sandbox-api.dbx.delivery"
    description: Development
  - url: "https://api.dbx.delivery"
    description: Production
tags:
  - name: quote
    description: Retrieve a Quote (before creating or updating an order)
  - name: orders
    description: Manage your orders
  - name: slots
    description: Retrieve available time slots
  - name: webhooks
    description: All webhooks are sent to a single url and defined by event property
paths:
  # ═══════════════════════════════════════════════════════════════════════════
  # QUOTE
  # ═══════════════════════════════════════════════════════════════════════════
  /order/quote:
    post:
      tags:
        - quote
      summary: Create a quote
      operationId: post-quote
      description: >-
        Validates if the order is serviceable by DBX and returns a quote
        including fee breakdown and distance. The quoted fee will remain
        fixed and will not change, regardless of when the order is placed.
        If no timeframe is provided, the earliest available slot is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
            examples:
              Simple ASAP quote (address by street):
                value:
                  pickup:
                    address:
                      street_address_1: "2049 Broadway"
                      city: "New York"
                      state: "NY"
                      zip: "10023"
                  delivery:
                    address:
                      street_address_1: "14 N Moore St"
                      city: "New York"
                      state: "NY"
                      zip: "10013"
                    items:
                      - description: bag
                        quantity: 1
                    size_category: small
              Quote with timeframe and dimensions:
                value:
                  pickup:
                    address:
                      address_id: 940645
                  delivery:
                    address:
                      street_address_1: "300 E 71st St"
                      city: "New York"
                      state: "NY"
                      zip: "10021"
                    items:
                      - description: keg
                        quantity: 2
                        length: 20
                        width: 15
                        height: 10
                        weight: 10
                  timeframe:
                    start_time: "2025-03-22T15:00:00.000Z"
                    end_time: "2025-03-22T18:00:00.000Z"
              Quote using customer_id:
                value:
                  pickup:
                    customer_id: 134
                  delivery:
                    customer_id: 133
                    items:
                      - description: bag
                        quantity: 1
                    size_category: small
      responses:
        "200":
          description: OK - Quote returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
              examples:
                ASAP quote:
                  value:
                    timeframe:
                      service: one_hour
                      start_time: "2025-03-22T15:00:00.000Z"
                      end_time: "2025-03-22T16:00:00.000Z"
                    pickup:
                      address:
                        address_id: 940645
                        formatted: "2049 Broadway, New York, NY 10023"
                        house_number: "2049"
                        street_address_1: "2049 Broadway"
                        street: "Broadway"
                        city: "New York"
                        state: "NY"
                        zip: "10023"
                        lat: 40.7779
                        lon: -73.9825
                        doorman: false
                    delivery:
                      address:
                        address_id: 512381
                        formatted: "14 N Moore St, New York, NY 10013"
                        house_number: "14"
                        street_address_1: "14 N Moore St"
                        street: "N Moore St"
                        city: "New York"
                        state: "NY"
                        zip: "10013"
                        lat: 40.7197
                        lon: -74.0066
                        doorman: false
                      tip: 0
                      size_category: small
                      measurement_summary:
                        max_dimension: 16
                        cubic_feet: 2
                        total_weight: 60
                        max_weight: 30
                        total_quantity: 1
                      items:
                        - description: bag
                          quantity: 1
                          barcode: "A1B2C3"
                          barcode_type: QRCODE
                          measurement: '<30lbs | <16" x <16" x <16"'
                    distance: 4.72
                    fee: 835
                    fee_breakdown:
                      base: 699
                      mileage_surcharge: 136
                      item_surcharge: 0
                      time_surcharge: 0
        "400":
          $ref: "#/components/responses/400-missing_params"
        "401":
          $ref: "#/components/responses/401-authentication_error"
        "422":
          $ref: "#/components/responses/422-invalid_params"
        "500":
          $ref: "#/components/responses/500-internal_server_error"

  "/order/quote/{order_id}":
    patch:
      tags:
        - quote
      summary: Modify order quote
      operationId: patch-quote
      description: >-
        Validates if the updated order is serviceable by DBX and returns
        a revised quote. Only post fields you wish to update. Changes to
        the address, items, or timeframe may affect the original fee.
        The response includes the previous_fee for comparison. Please
        refer to our FAQ guide for details on allowed updates based on order status.
      parameters:
        - schema:
            type: string
          name: order_id
          in: path
          required: true
          description: Order id of the delivery OR external_order_id
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdateRequest"
            examples:
              Updating tip:
                value:
                  delivery:
                    tip: 250
              Updating delivery address:
                value:
                  delivery:
                    address:
                      street_address_1: "400 E 74 St"
                      city: "New York"
                      state: "NY"
                      zip: "10021"
              Updating items:
                value:
                  delivery:
                    items:
                      - description: box
                        quantity: 2
                    size_category: medium
              Clearing timeframe (sets order to pending_timeframe):
                value:
                  timeframe: null
      responses:
        "200":
          description: OK - Revised quote returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
              examples:
                Updated quote:
                  value:
                    order_id: IL3YK3
                    fee: 1347
                    fee_breakdown:
                      previous_fee: 1200
                      base: 699
                      mileage_surcharge: 248
                      item_surcharge: 400
                      time_surcharge: 0
        "401":
          $ref: "#/components/responses/401-authentication_error"
        "404":
          $ref: "#/components/responses/404-not_found"
        "422":
          $ref: "#/components/responses/422-invalid_params"
        "500":
          $ref: "#/components/responses/500-internal_server_error"

  # ═══════════════════════════════════════════════════════════════════════════
  # ORDERS
  # ═══════════════════════════════════════════════════════════════════════════
  /order:
    post:
      tags:
        - orders
      summary: Create an order
      operationId: post-order
      description: >-
        Creates a new delivery between two addresses. If no timeframe is
        provided, the order is created with status `pending_timeframe`
        and must be updated with a timeframe before it can be dispatched.
        When a timeframe is provided, the order is created with status `processing`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
            examples:
              Simple ASAP order:
                value:
                  pickup:
                    name: John Doe
                    phone: "1234567890"
                    address:
                      street_address_1: "2049 Broadway"
                      city: "New York"
                      state: "NY"
                      zip: "10023"
                  delivery:
                    name: Jane Doe
                    phone: "1231231234"
                    address:
                      street_address_1: "14 N Moore St"
                      city: "New York"
                      state: "NY"
                      zip: "10013"
                    items:
                      - description: bag
                        quantity: 1
                    size_category: small
              Timeframe order with full options:
                value:
                  pickup:
                    name: John Doe
                    phone: "1234567890"
                    apt: "ground level"
                    note: "Please pickup at front desk"
                    address:
                      street_address_1: "2049 Broadway"
                      city: "New York"
                      state: "NY"
                      zip: "10023"
                    required_verification:
                      picture: true
                      barcode: false
                  delivery:
                    name: Jane Doe
                    phone: "1231231234"
                    apt: "47A"
                    note: "Use service entrance on Jane St"
                    tip: 200
                    external_order_id: "MY-ORDER-123"
                    address:
                      street_address_1: "14 N Moore St"
                      city: "New York"
                      state: "NY"
                      zip: "10013"
                    items:
                      - description: keg
                        quantity: 2
                        length: 20
                        width: 15
                        height: 10
                        weight: 10
                      - description: tripod
                        quantity: 1
                        length: 20
                        width: 15
                        height: 10
                        weight: 10
                    required_verification:
                      picture: true
                      signature: true
                      recipient: true
                      barcode: false
                      identification: false
                      pin: false
                  timeframe:
                    start_time: "2025-03-22T15:00:00.000Z"
                    end_time: "2025-03-22T18:00:00.000Z"
                    pickup_ready_by: "2025-03-22T14:30:00.000Z"
                    delivery_deadline: "2025-03-22T18:30:00.000Z"
              Order using existing customer_id:
                value:
                  pickup:
                    customer_id: 134
                  delivery:
                    customer_id: 133
                    tip: 200
                    items:
                      - description: bag
                        quantity: 1
                    size_category: small
                  timeframe:
                    start_time: "2025-03-22T15:00:00.000Z"
                    end_time: "2025-03-22T18:00:00.000Z"
              Order without timeframe (pending):
                value:
                  pickup:
                    name: John Doe
                    phone: "1234567890"
                    address:
                      address_id: 940645
                  delivery:
                    name: Jane Doe
                    phone: "1231231234"
                    address:
                      address_id: 512381
                    items:
                      - description: bag
                        quantity: 1
                    size_category: small
      responses:
        "200":
          description: OK - Order successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
              examples:
                Created order:
                  $ref: "#/components/examples/order_detail"
        "401":
          $ref: "#/components/responses/401-authentication_error"
        "422":
          $ref: "#/components/responses/422-invalid_params"
        "500":
          $ref: "#/components/responses/500-internal_server_error"

  "/order/{order_id}":
    parameters:
      - schema:
          type: string
        name: order_id
        in: path
        required: true
        description: Order id of the delivery OR external_order_id
    get:
      tags:
        - orders
      summary: Get an order
      operationId: get-order
      description: >-
        Retrieves the full details of an existing order, specified by the
        order_id or external_order_id in the URL.
      responses:
        "200":
          description: OK - Successfully returned order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
              examples:
                Order detail:
                  $ref: "#/components/examples/order_detail"
        "401":
          $ref: "#/components/responses/401-authentication_error"
        "404":
          $ref: "#/components/responses/404-not_found"
        "500":
          $ref: "#/components/responses/500-internal_server_error"
    patch:
      tags:
        - orders
      summary: Modify an order
      operationId: patch-order
      description: >-
        Modifies an existing delivery order, specified by the order_id or
        external_order_id in the URL. Only post fields you wish to update.
        Setting `timeframe` to `null` moves the order to `pending_timeframe` status.
        Please refer to our FAQ guide for details on allowed updates based on order status.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdateRequest"
            examples:
              Modify timeframe:
                value:
                  timeframe:
                    start_time: "2025-03-22T15:00:00.000Z"
                    end_time: "2025-03-22T18:00:00.000Z"
              Modify delivery info:
                value:
                  delivery:
                    name: "Jane Smith"
                    phone: "9175551234"
                    note: "Leave with doorman"
                    apt: "12B"
              Modify delivery address:
                value:
                  delivery:
                    address:
                      street_address_1: "400 E 74 St"
                      city: "New York"
                      state: "NY"
                      zip: "10021"
              Update items:
                value:
                  delivery:
                    items:
                      - description: box
                        quantity: 3
                        length: 12
                        width: 12
                        height: 12
                        weight: 15
              Set to pending_timeframe:
                value:
                  timeframe: null
      responses:
        "200":
          description: OK - Successfully updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
              examples:
                Updated order:
                  $ref: "#/components/examples/order_detail"
        "401":
          $ref: "#/components/responses/401-authentication_error"
        "404":
          $ref: "#/components/responses/404-not_found"
        "422":
          $ref: "#/components/responses/422-invalid_params"
        "500":
          $ref: "#/components/responses/500-internal_server_error"
    delete:
      tags:
        - orders
      summary: Cancel an order
      operationId: put-order
      description: >-
        Cancels a previously placed order, specified by the order_id in the URL.
        Only orders with status `pending_timeframe`, `processing`, `assigned`,
        or `arrived_at_pickup` can be canceled. If the order is still in
        `processing` status, the fee is zeroed out.
      responses:
        "200":
          description: OK - Successfully canceled order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
        "404":
          $ref: "#/components/responses/404-not_found"
        "422":
          $ref: "#/components/responses/422-invalid_params"

  # ═══════════════════════════════════════════════════════════════════════════
  # SLOTS
  # ═══════════════════════════════════════════════════════════════════════════
  /slots:
    post:
      tags:
        - slots
      summary: Get earliest available slot
      operationId: post-slot
      description: >-
        Retrieves the earliest available time slot for a delivery between
        two addresses. Returns a single slot grouped by service type.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlotsRequest"
            examples:
              By address:
                value:
                  pickup:
                    address:
                      street_address_1: "2049 Broadway"
                      city: "New York"
                      state: "NY"
                      zip: "10023"
                  delivery:
                    address:
                      street_address_1: "14 N Moore St"
                      city: "New York"
                      state: "NY"
                      zip: "10013"
              By address_id:
                value:
                  pickup:
                    address:
                      address_id: 940645
                  delivery:
                    address:
                      address_id: 512381
      responses:
        "200":
          description: OK - Earliest timeframe returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotsResponse"
              examples:
                Earliest slot:
                  value:
                    - service: one_hour
                      slots:
                        - start_time: "2025-03-22T15:00:00.000Z"
                          end_time: "2025-03-22T16:00:00.000Z"
                          pickup_ext: 30
                          delivery_ext: 30
                          pickup_ready_by: "2025-03-22T14:30:00.000Z"
                          delivery_deadline: "2025-03-22T16:30:00.000Z"
                    - service: three_hour
                      slots: []
                    - service: same_day
                      slots: []
        "401":
          $ref: "#/components/responses/401-authentication_error"
        "422":
          $ref: "#/components/responses/422-invalid_params"
        "500":
          $ref: "#/components/responses/500-internal_server_error"

  "/slots/{date}":
    parameters:
      - schema:
          type: string
          example: "03-22-2025"
        name: date
        in: path
        required: true
        description: "Date to return available slots for in MM-DD-YYYY format"
    post:
      tags:
        - slots
      summary: Get available slots for date
      operationId: post-slots-date
      description: >-
        Returns a list of available time slots between two addresses on the
        specified date, grouped by service type (one_hour, three_hour, same_day).
        Slot availability depends on the distance between addresses and operating
        hours (9 AM – 7 PM ET). Each slot includes pickup/delivery extension
        times based on your account settings.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlotsRequest"
            examples:
              By address:
                value:
                  pickup:
                    address:
                      street_address_1: "2049 Broadway"
                      city: "New York"
                      state: "NY"
                      zip: "10023"
                  delivery:
                    address:
                      street_address_1: "14 N Moore St"
                      city: "New York"
                      state: "NY"
                      zip: "10013"
      responses:
        "200":
          description: OK - Available timeframes for specified date returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotsResponse"
              examples:
                Available slots:
                  value:
                    - service: one_hour
                      slots:
                        - start_time: "2025-03-22T14:00:00.000Z"
                          end_time: "2025-03-22T15:00:00.000Z"
                          pickup_ext: 30
                          delivery_ext: 30
                          pickup_ready_by: "2025-03-22T13:30:00.000Z"
                          delivery_deadline: "2025-03-22T15:30:00.000Z"
                        - start_time: "2025-03-22T15:00:00.000Z"
                          end_time: "2025-03-22T16:00:00.000Z"
                          pickup_ext: 30
                          delivery_ext: 30
                          pickup_ready_by: "2025-03-22T14:30:00.000Z"
                          delivery_deadline: "2025-03-22T16:30:00.000Z"
                    - service: three_hour
                      slots:
                        - start_time: "2025-03-22T15:00:00.000Z"
                          end_time: "2025-03-22T18:00:00.000Z"
                          pickup_ext: 30
                          delivery_ext: 30
                          pickup_ready_by: "2025-03-22T14:30:00.000Z"
                          delivery_deadline: "2025-03-22T18:30:00.000Z"
                    - service: same_day
                      slots:
                        - start_time: "2025-03-22T19:00:00.000Z"
                          end_time: "2025-03-23T00:00:00.000Z"
                          pickup_ext: 30
                          delivery_ext: 30
                          pickup_ready_by: "2025-03-22T18:30:00.000Z"
                          delivery_deadline: "2025-03-23T00:30:00.000Z"
        "401":
          $ref: "#/components/responses/401-authentication_error"
        "422":
          $ref: "#/components/responses/422-invalid_params"
        "500":
          $ref: "#/components/responses/500-internal_server_error"

  # ═══════════════════════════════════════════════════════════════════════════
  # WEBHOOKS
  # ═══════════════════════════════════════════════════════════════════════════
  /order.processing:
    post:
      tags:
        - webhooks
      summary: Order processing
      operationId: order.processing
      description: Sent when an order enters the `processing` status (e.g. newly created with a timeframe, or a `pending_timeframe` order that just received one).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWebhook"
              examples:
                "":
                  value:
                    event: order.processing
                    order_id: SEWG5J
                    external_order_id: null
                    status: processing
                    pickup:
                      customer_id: 1
                      phone: "1234567890"
                      phone_formatted: "+1 (123) 456-7890"
                      name: West Side Wines
                      apt: "1"
                      access_code: null
                      note: ""
                      eta: null
                      address:
                        address_id: 783607
                        formatted: "1305 York Ave, New York, NY 10021"
                        street_address_1: "1305 York Ave"
                        street: "York Ave"
                        city: New York
                        state: NY
                        zip: "10021"
                        lat: 40.7654
                        lon: -73.9551
                      required_verification:
                        picture: true
                        barcode: false
                      uploaded_verification:
                        picture: null
                        barcode: []
                    delivery:
                      customer_id: 2
                      phone: "2147483647"
                      phone_formatted: "+1 (214) 748-3647"
                      name: Olivia Thompson
                      apt: ""
                      access_code: null
                      note: ""
                      eta: null
                      address:
                        address_id: 863611
                        formatted: "300 E 71st St, New York, NY 10021"
                        street_address_1: "300 E 71st St"
                        street: "E 71st St"
                        city: New York
                        state: NY
                        zip: "10021"
                        lat: 40.7679
                        lon: -73.9585
                      required_verification:
                        picture: false
                        barcode: false
                        recipient: false
                        signature: false
                        identification: false
                        pin: false
                      uploaded_verification:
                        picture: null
                        barcode: []
                        recipient: null
                        signature: null
                        identification: null
                        pin: null
                      tip: 300
                      size_category: large
                      items:
                        - description: keg
                          quantity: 1
                          length: 8
                          width: 8
                          height: 25
                          weight: 100
                          measurement: '100lbs | 8" x 8" x 25"'
                    timeframe:
                      service: three_hour
                      start_time: "2025-01-27T15:00:00.000Z"
                      end_time: "2025-01-27T18:00:00.000Z"
                    created_at: "2025-01-27T15:00:00.000Z"
                    last_updated: "2025-01-27T15:00:00.000Z"
                    tracking_url: "https://track.dbx.delivery/SEWG5J"
                    fee: 2199
                    fee_breakdown:
                      base: 699
                      mileage_surcharge: 0
                      item_surcharge: 1500
                      time_surcharge: 0
                    driver: {}
                    logs:
                      - log: processing
                        datetime: "2025-01-27T15:00:00.000Z"
                        is_completed: true

  /order.updated:
    post:
      tags:
        - webhooks
      summary: Order information updated
      operationId: order.updated
      description: Sent when order information is updated (address, timeframe, items, etc.).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWebhook"

  /order.canceled:
    post:
      tags:
        - webhooks
      summary: Order cancelled
      operationId: order.canceled
      description: Sent when an order is cancelled by the user or admin.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWebhook"

  /driver.assigned:
    post:
      tags:
        - webhooks
      summary: Driver assigned to order
      operationId: driver.assigned
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverWebhook"
              examples:
                "":
                  $ref: "#/components/examples/driver_webhook"

  /driver.location:
    post:
      tags:
        - webhooks
      summary: Driver location updated
      operationId: driver.location
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverWebhook"
              examples:
                "":
                  $ref: "#/components/examples/driver_webhook"

  /driver.pickup_next_stop:
    post:
      tags:
        - webhooks
      summary: Driver en route to pickup
      operationId: driver.pickup_next_stop
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverWebhook"
              examples:
                "":
