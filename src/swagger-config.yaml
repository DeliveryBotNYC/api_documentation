# ═══════════════════════════════════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Address ────────────────────────────────────────────────────────────
    Address:
      type: object
      description: >-
        Resolved address object. When creating or updating, provide one of
        three formats: `address_id`, `street_address_1` + `city` + `state` + `zip`,
        or reference via `customer_id` on the parent object.
      properties:
        address_id:
          type: integer
          description: Unique address identifier. Can be used in place of full address fields.
        formatted:
          type: string
          readOnly: true
          description: Full formatted address string
          example: "2049 Broadway, New York, NY 10023"
        house_number:
          type: string
          readOnly: true
        street_address_1:
          type: string
          description: Street address (house number + street name)
          example: "2049 Broadway"
        street:
          type: string
          readOnly: true
        city:
          type: string
          example: "New York"
        state:
          type: string
          example: "NY"
        zip:
          type: string
          example: "10023"
        lat:
          type: number
          readOnly: true
        lon:
          type: number
          readOnly: true
        doorman:
          type: boolean
          readOnly: true
          description: Whether the building has a doorman

    # ─── Address Input (for requests) ───────────────────────────────────────
    AddressInput:
      description: >-
        Provide address using one of two methods:
        (1) `address_id` for a previously resolved address, or
        (2) `street_address_1` + `city` + `state` + `zip` for a new address.
      oneOf:
        - type: object
          title: By address_id
          required:
            - address_id
          properties:
            address_id:
              type: integer
              description: Existing address ID
        - type: object
          title: By street and zip
          required:
            - street_address_1
            - city
            - state
            - zip
          properties:
            street_address_1:
              type: string
              example: "2049 Broadway"
            city:
              type: string
              example: "New York"
            state:
              type: string
              example: "NY"
            zip:
              type: string
              example: "10023"

    # ─── Timeframe ──────────────────────────────────────────────────────────
    Timeframe:
      type: object
      properties:
        service:
          type: string
          readOnly: true
          enum:
            - one_hour
            - three_hour
            - same_day
          description: >-
            Automatically determined service level based on the time window duration
            and distance. `one_hour` = 1hr window, `three_hour` = 3hr window,
            `same_day` = 2PM–7PM ET window.
        start_time:
          type: string
          format: date-time
          description: Start of delivery window (ISO 8601)
        end_time:
          type: string
          format: date-time
          description: End of delivery window (ISO 8601)
        pickup_ready_by:
          type: string
          format: date-time
          description: >-
            Earliest time driver should arrive at pickup. Defaults to
            `start_time` minus your account's pickup extension.
        delivery_deadline:
          type: string
          format: date-time
          description: >-
            Latest time delivery should be completed. Defaults to
            `end_time` plus your account's delivery extension.

    # ─── Timeframe Input ────────────────────────────────────────────────────
    TimeframeInput:
      type: object
      nullable: true
      description: >-
        Delivery time window. Set to `null` to clear the timeframe and move
        the order to `pending_timeframe` status. If omitted entirely on
        order creation, the order starts as `pending_timeframe`.
      required:
        - start_time
        - end_time
      properties:
        start_time:
          type: string
          format: date-time
          description: Must be in the future
        end_time:
          type: string
          format: date-time
          description: Must be after start_time
        pickup_ready_by:
          type: string
          format: date-time
          description: Optional. Must be at or before start_time.
        delivery_deadline:
          type: string
          format: date-time
          description: Optional. Must be at or after end_time.

    # ─── Item Input ─────────────────────────────────────────────────────────
    ItemInput:
      type: object
      description: >-
        An item in the delivery. Either provide `size_category` at the
        delivery level (all items use predefined dimensions), or provide
        `length`/`width`/`height`/`weight` on each item (exact dimensions).
        You cannot mix both — use one approach per order.
      required:
        - description
      properties:
        description:
          type: string
          maxLength: 100
          description: Description of the item
          example: "bag"
        quantity:
          type: integer
          minimum: 1
          default: 1
        length:
          type: integer
          minimum: 1
          description: Length in inches (required if using exact dimensions)
        width:
          type: integer
          minimum: 1
          description: Width in inches (required if using exact dimensions)
        height:
          type: integer
          minimum: 1
          description: Height in inches (required if using exact dimensions)
        weight:
          type: integer
          minimum: 1
          description: Weight in pounds (required if using exact dimensions)

    # ─── Item Response ──────────────────────────────────────────────────────
    ItemResponse:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: integer
        length:
          type: integer
          nullable: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        weight:
          type: integer
          nullable: true
        barcode:
          type: string
          description: Auto-generated barcode value for scanning
        barcode_type:
          type: string
          enum: [CODE128, CODE39, EAN13, QRCODE, PDF417]
          default: QRCODE
        measurement:
          type: string
          description: Human-readable measurement string
          example: '10lbs | 20" x 15" x 10"'
        shipping_label:
          type: string
          nullable: true
          description: ZPL format shipping label (only for orders with a timeframe)

    # ─── Required Verification ──────────────────────────────────────────────
    PickupVerification:
      type: object
      description: Proof of pickup requirements
      properties:
        picture:
          type: boolean
          default: false
          description: Require photo at pickup
        barcode:
          type: boolean
          default: false
          description: Require barcode scan at pickup

    DeliveryVerification:
      type: object
      description: Proof of delivery requirements
      properties:
        picture:
          type: boolean
          default: false
          description: Require photo at delivery
        barcode:
          type: boolean
          default: false
          description: Require barcode scan at delivery
        recipient:
          type: boolean
          default: false
          description: Require recipient name confirmation
        signature:
          type: boolean
          default: false
          description: Require recipient signature
        identification:
          type: boolean
          default: false
          description: Require ID verification (e.g. age-restricted delivery)
        pin:
          type: boolean
          default: false
          description: Require PIN code from recipient

    # ─── Uploaded Verification (response) ───────────────────────────────────
    PickupUploadedVerification:
      type: object
      readOnly: true
      properties:
        picture:
          type: string
          nullable: true
          description: URL to pickup photo
        barcode:
          type: array
          items:
            type: string
            nullable: true
          description: URLs to barcode scan photos

    DeliveryUploadedVerification:
      type: object
      readOnly: true
      properties:
        picture:
          type: string
          nullable: true
          description: URL to delivery photo
        barcode:
          type: array
          items:
            type: string
            nullable: true
          description: URLs to barcode scan photos
        recipient:
          type: string
          nullable: true
          description: Recipient name as entered by driver
        signature:
          type: string
          nullable: true
          description: URL to signature image
        identification:
          type: string
          nullable: true
        pin:
          type: string
          nullable: true

    # ─── Fee Breakdown ──────────────────────────────────────────────────────
    FeeBreakdown:
      type: object
      readOnly: true
      description: Breakdown of the total fee in cents
      properties:
        previous_fee:
          type: integer
          description: Previous fee before this update (only on quote updates)
        base:
          type: integer
          description: Base delivery fee in cents
        mileage_surcharge:
          type: integer
          description: Additional cost based on distance in cents
        item_surcharge:
          type: integer
          description: Additional cost based on item size category in cents
        time_surcharge:
          type: integer
          description: Additional cost based on service level in cents

    # ─── Measurement Summary ────────────────────────────────────────────────
    MeasurementSummary:
      type: object
      readOnly: true
      properties:
        max_dimension:
          type: number
          description: Largest single dimension across all items (inches)
        cubic_feet:
          type: number
          description: Total cubic feet of all items
        total_weight:
          type: number
          description: Total weight of all items (lbs)
        max_weight:
          type: number
          description: Heaviest single item (lbs)
        total_quantity:
          type: integer
          description: Sum of all item quantities

    # ─── Order Log Entry ────────────────────────────────────────────────────
    OrderLogEntry:
      type: object
      readOnly: true
      properties:
        log_id:
          type: integer
        log:
          type: string
          enum:
            - pending_timeframe
            - processing
            - assigned
            - arrived_at_pickup
            - picked_up
            - arrived_at_delivery
            - undeliverable
            - delivered
            - returned
            - canceled
            - not_ready
            - incorrect_size
            - timeslot_clicked
            - timeslot_updated
        by:
          type: string
          description: Who triggered the log (user, driver, admin, Customer, system)
        datetime:
          type: string
          format: date-time
        is_completed:
          type: boolean

    # ─── Rating ─────────────────────────────────────────────────────────────
    Rating:
      type: object
      readOnly: true
      properties:
        rating:
          type: boolean
          description: Thumbs up (true) or thumbs down (false)
        created_at:
          type: string
          format: date-time

    # ═══════════════════════════════════════════════════════════════════════
    # REQUEST SCHEMAS
    # ═══════════════════════════════════════════════════════════════════════

    # ─── Quote Request ──────────────────────────────────────────────────────
    QuoteRequest:
      type: object
      description: >-
        Request body for creating a delivery quote. Provide pickup and delivery
        locations using one of three methods: `customer_id`, `address.address_id`,
        or full address fields.
      properties:
        pickup:
          type: object
          description: Pickup location — provide one of `customer_id`, `address.address_id`, or full address
          properties:
            customer_id:
              type: integer
              description: Existing customer ID (address resolved from customer record)
            name:
              type: string
            phone:
              type: string
            access_code:
              type: string
            note:
              type: string
            address:
              $ref: "#/components/schemas/AddressInput"
            required_verification:
              $ref: "#/components/schemas/PickupVerification"
        delivery:
          type: object
          required:
            - items
          description: Delivery location and items
          properties:
            customer_id:
              type: integer
              description: Existing customer ID (address resolved from customer record)
            name:
              type: string
            phone:
              type: string
            tip:
              type: integer
              minimum: 0
              default: 0
              description: Tip amount in cents
            note:
              type: string
            apt:
              type: string
            external_order_id:
              type: string
              description: Your own order reference ID
            access_code:
              type: string
            address:
              $ref: "#/components/schemas/AddressInput"
            size_category:
              type: string
              enum: [xsmall, small, medium, large]
              description: >-
                Predefined size category. Use this OR provide exact dimensions
                on each item — not both.
            items:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/ItemInput"
            required_verification:
              $ref: "#/components/schemas/DeliveryVerification"
        timeframe:
          $ref: "#/components/schemas/TimeframeInput"
      required:
        - delivery

    # ─── Slots Request ──────────────────────────────────────────────────────
    SlotsRequest:
      type: object
      description: Provide pickup and delivery locations to check slot availability
      properties:
        pickup:
          type: object
          properties:
            customer_id:
              type: integer
            address:
              $ref: "#/components/schemas/AddressInput"
        delivery:
          type: object
          properties:
            customer_id:
              type: integer
            address:
              $ref: "#/components/schemas/AddressInput"

    # ─── Order Create Request ───────────────────────────────────────────────
    OrderCreateRequest:
      type: object
      description: >-
        Request body for creating a new order. If `timeframe` is omitted,
        the order starts in `pending_timeframe` status.
      required:
        - delivery
      properties:
        pickup:
          type: object
          description: >-
            Pickup location. Provide `customer_id` (uses stored address/info),
            or `name` + `phone` with `address`.
          properties:
            customer_id:
              type: integer
              description: Use an existing customer's stored address and info
            name:
              type: string
              description: Required if not using customer_id
            phone:
              type: string
              description: Required if not using customer_id
            apt:
              type: string
            access_code:
              type: string
            note:
              type: string
              description: Instructions for the driver at pickup
            address:
              $ref: "#/components/schemas/AddressInput"
            required_verification:
              $ref: "#/components/schemas/PickupVerification"
        delivery:
          type: object
          required:
            - items
          description: >-
            Delivery location and items. Provide `customer_id` or
            `name` + `phone` with `address`.
          properties:
            customer_id:
              type: integer
            name:
              type: string
              description: Required if not using customer_id
            phone:
              type: string
              description: Required if not using customer_id
            tip:
              type: integer
              minimum: 0
              default: 0
              description: Tip amount in cents
            note:
              type: string
              description: Instructions for the driver at delivery
            apt:
              type: string
            external_order_id:
              type: string
              description: Your own order reference ID
            access_code:
              type: string
            address:
              $ref: "#/components/schemas/AddressInput"
            size_category:
              type: string
              enum: [xsmall, small, medium, large]
              description: >-
                Predefined size category. Use this OR provide exact dimensions
                on each item — not both.
            items:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/ItemInput"
            required_verification:
              $ref: "#/components/schemas/DeliveryVerification"
        timeframe:
          $ref: "#/components/schemas/TimeframeInput"

    # ─── Order Update Request ───────────────────────────────────────────────
    OrderUpdateRequest:
      type: object
      description: >-
        Only include the fields you want to change. Omitted fields remain
        unchanged. Allowed fields depend on the current order status.
      properties:
        pickup:
          type: object
          properties:
            customer_id:
              type: integer
            name:
              type: string
            phone:
              type: string
            access_code:
              type: string
            note:
              type: string
            apt:
              type: string
            address:
              $ref: "#/components/schemas/AddressInput"
            required_verification:
              $ref: "#/components/schemas/PickupVerification"
        delivery:
          type: object
          properties:
            customer_id:
              type: integer
            name:
              type: string
            phone:
              type: string
            tip:
              type: integer
              minimum: 0
              description: Tip in cents
            note:
              type: string
            apt:
              type: string
            access_code:
              type: string
            address:
              $ref: "#/components/schemas/AddressInput"
            size_category:
              type: string
              enum: [xsmall, small, medium, large]
            items:
              type: array
              items:
                $ref: "#/components/schemas/ItemInput"
            required_verification:
              $ref: "#/components/schemas/DeliveryVerification"
        timeframe:
          $ref: "#/components/schemas/TimeframeInput"

    # ═══════════════════════════════════════════════════════════════════════
    # RESPONSE SCHEMAS
    # ═══════════════════════════════════════════════════════════════════════

    # ─── Quote Response ─────────────────────────────────────────────────────
    QuoteResponse:
      type: object
      description: Delivery quote with resolved addresses and fee breakdown
      properties:
        timeframe:
          allOf:
            - $ref: "#/components/schemas/Timeframe"
          nullable: true
          description: Validated timeframe (null if no timeframe was provided)
        pickup:
          type: object
          properties:
            address:
              $ref: "#/components/schemas/Address"
        delivery:
          type: object
          properties:
            address:
              $ref: "#/components/schemas/Address"
            tip:
              type: integer
              description: Tip in cents
            size_category:
              type: string
              enum: [xsmall, small, medium, large]
              description: Determined size category
            measurement_summary:
              $ref: "#/components/schemas/MeasurementSummary"
            items:
              type: array
              items:
                $ref: "#/components/schemas/ItemResponse"
        distance:
          type: number
          readOnly: true
          description: Distance between pickup and delivery in miles
        fee:
          type: integer
          readOnly: true
          description: Total delivery fee in cents
        fee_breakdown:
          $ref: "#/components/schemas/FeeBreakdown"

    # ─── Order Detail Response ──────────────────────────────────────────────
    OrderDetailResponse:
      type: object
      description: Full order details
      properties:
        order_id:
          type: string
          readOnly: true
          description: 6-character unique order identifier
          example: IL3YK3
        external_order_id:
          type: string
          nullable: true
          description: Your external order reference
        status:
          type: string
          readOnly: true
          enum:
            - pending_timeframe
            - processing
            - assigned
            - arrived_at_pickup
            - picked_up
            - arrived_at_delivery
            - undeliverable
            - delivered
            - returned
            - canceled
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_updated:
          type: string
          format: date-time
          readOnly: true
        fee:
          type: integer
          readOnly: true
          description: Total delivery fee in cents
        source:
          type: string
          readOnly: true
          description: How the order was created (e.g. Portal, API, Shopify)
        timeframe:
          allOf:
            - $ref: "#/components/schemas/Timeframe"
          nullable: true
        pickup:
          type: object
          properties:
            customer_id:
              type: integer
              readOnly: true
            phone:
              type: string
            phone_formatted:
              type: string
              readOnly: true
              example: "+1 (123) 456-7890"
            name:
              type: string
            apt:
              type: string
            access_code:
              type: string
            external_customer_id:
              type: string
            note:
              type: string
              description: Driver instructions at pickup
            pickup_time_estimated:
              type: string
              format: date-time
              nullable: true
              readOnly: true
            pickup_time_actual:
              type: string
              format: date-time
              nullable: true
              readOnly: true
            address:
              $ref: "#/components/schemas/Address"
            required_verification:
              $ref: "#/components/schemas/PickupVerification"
            uploaded_verification:
              $ref: "#/components/schemas/PickupUploadedVerification"
        delivery:
          type: object
          properties:
            customer_id:
              type: integer
              readOnly: true
            phone:
              type: string
            phone_formatted:
              type: string
              readOnly: true
            name:
              type: string
            apt:
              type: string
            access_code:
              type: string
            external_customer_id:
              type: string
            note:
              type: string
              description: Driver instructions at delivery
            tip:
              type: integer
              description: Tip in cents
            delivery_time_estimated:
              type: string
              format: date-time
              nullable: true
              readOnly: true
            delivery_time_actual:
              type: string
              format: date-time
              nullable: true
              readOnly: true
            address:
              $ref: "#/components/schemas/Address"
            size_category:
              type: string
              enum: [xsmall, small, medium, large]
              readOnly: true
            items:
              type: array
              items:
                $ref: "#/components/schemas/ItemResponse"
            required_verification:
              $ref: "#/components/schemas/DeliveryVerification"
            uploaded_verification:
              $ref: "#/components/schemas/DeliveryUploadedVerification"
        user:
          type: object
          readOnly: true
          properties:
            user_id:
              type: integer
            firstname:
              type: string
            email:
              type: string
        driver:
          type: object
          readOnly: true
          properties:
            driver_id:
              type: integer
              nullable: true
            firstname:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true
            location:
              type: object
              nullable: true
              properties:
                lat:
                  type: number
                lon:
                  type: number
            path:
              type: array
              description: Simplified driver path coordinates
              items:
                type: object
                properties:
                  lat:
                    type: number
                  lon:
                    type: number
                  datetime:
                    type: string
                    format: date-time
        tracking_url:
          type: string
          readOnly: true
          description: Public tracking URL for the delivery recipient
          example: "https://track.dbx.delivery/IL3YK3"
        distance:
          type: number
          readOnly: true
          description: Distance between pickup and delivery in miles
        fee_breakdown:
          $ref: "#/components/schemas/FeeBreakdown"
        logs:
          type: array
          readOnly: true
          items:
            $ref: "#/components/schemas/OrderLogEntry"
        stops:
          type: array
          readOnly: true
          description: Intermediate stops between pickup and delivery (driver's other stops)
          items:
            type: object
            properties:
              stop_number:
                type: integer
              status:
                type: string
                enum: [to_do, completed]
              lat:
                type: number
              lon:
                type: number
        navigation_path:
          type: array
          readOnly: true
          nullable: true
          description: Turn-by-turn navigation path coordinates
          items:
            type: object
            properties:
              lat:
                type: number
              lon:
                type: number
        ratings:
          type: object
          readOnly: true
          description: Ratings keyed by who left the rating
          additionalProperties:
            $ref: "#/components/schemas/Rating"

    # ─── Slots Response ─────────────────────────────────────────────────────
    SlotsResponse:
      type: array
      description: >-
        Available time slots grouped by service type. Each service may
        have zero or more available slots depending on distance and time.
      items:
        type: object
        properties:
          service:
            type: string
            enum: [one_hour, three_hour, same_day]
          slots:
            type: array
            items:
              type: object
              properties:
                start_time:
                  type: string
                  format: date-time
                end_time:
                  type: string
                  format: date-time
                pickup_ext:
                  type: integer
                  description: Pickup extension in minutes (from account settings)
                delivery_ext:
                  type: integer
                  description: Delivery extension in minutes (from account settings)
                pickup_ready_by:
                  type: string
                  format: date-time
                  description: Computed earliest pickup time (start_time minus pickup_ext, clamped to store hours)
                delivery_deadline:
                  type: string
                  format: date-time
                  description: Computed latest delivery time (end_time plus delivery_ext, clamped to store hours)

    # ─── Webhook Schemas ────────────────────────────────────────────────────
    OrderWebhook:
      type: object
      description: >-
        Order lifecycle webhook. Contains the full order detail alongside
        the event name.
      properties:
        event:
          type: string
          enum:
            - order.processing
            - order.updated
            - order.canceled
        order_id:
          type: string
        external_order_id:
          type: string
          nullable: true
        status:
          type: string
        pickup:
          type: object
          description: Same shape as OrderDetailResponse.pickup
        delivery:
          type: object
          description: Same shape as OrderDetailResponse.delivery
        timeframe:
          $ref: "#/components/schemas/Timeframe"
        created_at:
          type: string
          format: date-time
        last_updated:
          type: string
          format: date-time
        tracking_url:
          type: string
        fee:
          type: integer
        fee_breakdown:
          $ref: "#/components/schemas/FeeBreakdown"
        driver:
          type: object
        logs:
          type: array
          items:
            $ref: "#/components/schemas/OrderLogEntry"

    DriverWebhook:
      type: object
      description: Driver event webhook
      properties:
        event:
          type: string
          enum:
            - driver.assigned
            - driver.location
            - driver.pickup_next_stop
            - driver.arrived_at_pickup
            - driver.picked_up
            - driver.delivery_next_stop
            - driver.arrived_at_delivery
            - driver.undeliverable
            - driver.delivered
            - driver.returned
        order_id:
          type: string
        external_order_id:
          type: string
          nullable: true
        driver:
          type: object
          properties:
            name:
              type: string
            phone:
              type: string
            vehicle:
              type: string
            location:
              type: object
              properties:
                lat:
                  type: string
                lon:
                  type: string
        date_time:
          type: string
          format: date-time

